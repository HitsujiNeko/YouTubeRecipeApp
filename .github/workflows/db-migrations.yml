name: DB Migrations

on:
  pull_request:
    paths:
      - "apps/web/supabase/migrations/**"
      - ".github/workflows/db-migrations.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/supabase/migrations/**"
      - ".github/workflows/db-migrations.yml"
  workflow_dispatch:

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify migration naming
        run: |
          set -e
          ls -1 supabase/migrations/*.sql >/dev/null
          python - <<'PY'
          import pathlib, re, sys
          files = sorted(pathlib.Path('supabase/migrations').glob('*.sql'))
          pattern = re.compile(r'^\d{12}_[a-z0-9_]+\.sql$')
          bad = [f.name for f in files if not pattern.match(f.name)]
          if bad:
              print('Invalid migration filename(s):')
              for b in bad:
                  print('-', b)
              sys.exit(1)
          print(f'OK: {len(files)} migration file(s)')
          PY

  apply-staging:
    runs-on: ubuntu-latest
    needs: validate-migrations
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to linked staging project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping apply-staging because required secrets are not set."
            exit 0
          fi

          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
